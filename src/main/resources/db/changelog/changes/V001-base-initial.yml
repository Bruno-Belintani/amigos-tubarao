databaseChangeLog:
  - changeSet:
      id: V001
      author: michael
      changes:
        - sql: "drop table if exists dados_pessoais CASCADE; 
                drop table if exists doacao CASCADE; 
                drop table if exists informacoes_adicionais CASCADE;
                
                 create table dados_pessoais (
                      dados_pessoais_id bigint not null,
                      cpf_cnpj varchar(255),
                      data_nascimento varchar(255),
                      email varchar(255),
                      nome_completo varchar(255),
                      telefone varchar(255),
                      doacao_id bigint,
                      info_adic_id bigint,
                      primary key (dados_pessoais_id)
                  );
                  
                  create table doacao (
                     doacao_id bigint not null,
                      percentual_doado numeric not null,
                      valor_doado numeric not null,
                      valor_meta numeric not null,
                      dados_pessoais_id bigint,
                      primary key (doacao_id)
                  );
                  
                  create table informacoes_adicionais (
                    info_adic_id bigint not null,
                    cep varchar(255),
                    cidade varchar(255),
                    complemento varchar(255),
                    endereco varchar(255),
                    estado varchar(255),
                    numero varchar(255),
                    primary key (info_adic_id)
                );
                
                alter table dados_pessoais 
                   add constraint FKammebg6ws3ejbywm2s84g0rhe 
                   foreign key (doacao_id) 
                   references doacao;
                
                alter table dados_pessoais 
                   add constraint FKapupxoq34k0ja9udcyl9ef5b9 
                   foreign key (info_adic_id) 
                   references informacoes_adicionais;
                
                alter table doacao 
                   add constraint FK9r2b3jrskhgab0tuye4h3ib0f 
                   foreign key (dados_pessoais_id) 
                   references dados_pessoais;"
                

